<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SYBA North Fargo Practice Scheduler</title>
<link rel="icon" href="https://sybafargo.dreamhosters.com/wp-content/uploads/2026/02/SYBA-logo-150x150.png">
<style>
  :root {
    --bg: #f3f5f8;
    --panel: #ffffff;
    --line: #cfd6e0;
    --line-soft: #e3e8ef;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #0c2340;
    --accent-2: #14305a;
    --accent-soft: #e6eaf2;
    --gold: #c8a93e;
    --gold-2: #a68820;
    --gold-soft: #f7eecb;
    --danger: #c1272d;
    --ok: #15803d;
    --slot: 36px;
    --gym-col: 110px;
    --time-col: 72px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    overflow: hidden;
  }
  button {
    font: inherit;
    padding: 6px 12px;
    border: 1px solid var(--accent);
    background: white;
    color: var(--accent);
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover { background: var(--accent-soft); }
  button.primary { background: var(--accent); color: white; }
  button.primary:hover { background: var(--accent-2); }
  button.gold { background: var(--gold); color: var(--accent); border-color: var(--gold-2); font-weight: 700; }
  button.gold:hover { background: var(--gold-2); color: white; }
  button.tiny { padding: 2px 8px; font-size: 12px; }
  button.danger { border-color: var(--danger); color: var(--danger); }
  button.danger:hover { background: #fbeaea; }
  button[disabled] { opacity: .5; cursor: not-allowed; }

  /* ============== Sidebar ============== */
  #sidebar {
    width: 290px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #sidebar header {
    padding: 14px 16px;
    background: var(--accent);
    border-bottom: 4px solid var(--gold);
    color: white;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 46px; height: 46px;
    flex-shrink: 0;
    background: white;
    border-radius: 6px;
    padding: 2px;
    box-shadow: 0 0 0 2px var(--gold);
  }
  .brand-text { min-width: 0; }
  #sidebar header h1 {
    margin: 0;
    font-size: 13px;
    color: white;
    letter-spacing: .4px;
    line-height: 1.2;
  }
  #sidebar header h1 .gold-accent { color: var(--gold); }
  #sidebar header .sub { font-size: 11px; color: var(--gold-soft); margin-top: 3px; }
  #sidebar header .version-tag { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 4px; font-variant-numeric: tabular-nums; }

  #sidebar .scroll { overflow-y: auto; padding: 12px 16px; flex: 1; }
  #sidebar h3 {
    margin: 14px 0 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
  }
  #sidebar h3:first-child { margin-top: 0; }
  .group-heading {
    margin: 12px 0 4px;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
  }
  .chip {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    margin: 4px 0;
    border-radius: 14px;
    color: white;
    font-size: 12.5px;
    font-weight: 600;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
    position: relative;
  }
  body:not(.read-only) .chip { cursor: grab; }
  body:not(.read-only) .chip:active { cursor: grabbing; }
  .chip .meta {
    margin-left: auto;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity .12s;
  }
  .chip:hover .meta { opacity: 1; }
  .chip .iconbtn {
    width: 18px; height: 18px;
    border-radius: 9px;
    background: rgba(255,255,255,.25);
    color: white;
    border: none;
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .chip .iconbtn:hover { background: rgba(255,255,255,.45); }
  .chip.blackout {
    background: repeating-linear-gradient(45deg, #4a4a4a, #4a4a4a 6px, #5a5a5a 6px, #5a5a5a 12px);
  }
  .gym-row {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    margin: 3px 0;
    background: #eef1f5;
    border-radius: 4px;
    font-size: 13px;
  }
  .gym-row .name { flex: 1; }
  .gym-row .iconbtn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 2px 6px;
    font-size: 13px;
  }
  .gym-row .iconbtn:hover { color: var(--accent); }
  .add-row {
    width: 100%;
    margin-top: 4px;
    background: var(--accent-soft);
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 6px;
    font-size: 12.5px;
  }
  .add-row:hover { background: #d4e2f5; }
  .empty-hint { color: var(--muted); font-size: 12px; font-style: italic; padding: 4px 0; }

  /* Read-only mode hides editor controls */
  body.read-only .editor-only { display: none !important; }
  body.read-only .chip .meta { display: none; }

  /* ============== Main ============== */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #toolbar {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 2px;
  }
  .week-nav button {
    border: none;
    background: transparent;
    color: var(--accent);
    padding: 4px 10px;
    font-weight: 600;
  }
  .week-nav button:hover { background: rgba(30,74,138,.15); }
  .week-label {
    padding: 2px 10px;
    font-weight: 600;
    color: var(--accent);
    min-width: 220px;
    text-align: center;
  }
  .spacer { flex: 1; }

  .save-status {
    font-size: 12px;
    color: var(--muted);
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .save-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ok);
  }
  .save-status.dirty .dot { background: var(--gold); }
  .save-status.saving .dot { background: var(--gold); animation: pulse 1s infinite; }
  .save-status.error .dot { background: var(--danger); }
  @keyframes pulse { 50% { opacity: .35; } }

  .auth-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--muted);
    padding: 0 4px;
  }
  .auth-info b { color: var(--accent); }

  /* Banner shown when no schedule has been initialized */
  .info-banner {
    background: #fff7e6;
    color: #7a4f00;
    border: 1px solid #f0d39d;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 14px 16px;
    font-size: 13px;
  }
  .info-banner.error { background: #fbeaea; color: #7a1416; border-color: #e8b6b8; }

  /* ============== Schedule grid ============== */
  #grid-wrap {
    flex: 1;
    overflow: auto;
    background: var(--bg);
  }
  .grid {
    display: inline-block;
    min-width: 100%;
    background: var(--panel);
  }
  .grid-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: white;
    border-bottom: 2px solid var(--line);
  }
  .header-row { display: flex; }
  .header-row .corner {
    width: var(--time-col);
    flex-shrink: 0;
    background: white;
    border-right: 2px solid var(--line);
  }
  .day-group {
    display: flex;
    flex-direction: column;
    border-right: 2px solid var(--line);
    flex-shrink: 0;
  }
  .day-group:last-child { border-right: none; }
  .day-title {
    text-align: center;
    padding: 8px 6px;
    font-weight: 700;
    color: white;
    background: var(--accent);
    border-bottom: 2px solid var(--gold);
    font-size: 13px;
    letter-spacing: .3px;
  }
  .gym-headers { display: flex; }
  .gym-header {
    width: var(--gym-col);
    flex-shrink: 0;
    text-align: center;
    padding: 6px 4px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--accent);
    background: #fafbfc;
    border-right: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line);
  }
  .gym-header:last-child { border-right: none; }
  .day-today .day-title { background: var(--gold); color: var(--accent); border-bottom-color: var(--accent); }
  .day-today .gym-header { background: var(--gold-soft); }

  .body-row { display: flex; }
  .time-col {
    width: var(--time-col);
    flex-shrink: 0;
    border-right: 2px solid var(--line);
    background: white;
    position: sticky;
    left: 0;
    z-index: 5;
  }
  .time-label {
    height: var(--slot);
    padding: 4px 8px;
    font-size: 11.5px;
    color: var(--muted);
    text-align: right;
    border-bottom: 1px solid var(--line-soft);
    line-height: 1;
  }
  .day-strip {
    display: flex;
    border-right: 2px solid var(--line);
    flex-shrink: 0;
  }
  .day-strip:last-child { border-right: none; }
  .gym-strip {
    width: var(--gym-col);
    position: relative;
    flex-shrink: 0;
    border-right: 1px solid var(--line-soft);
    background: white;
  }
  .gym-strip:last-child { border-right: none; }

  .drop-cell {
    height: var(--slot);
    border-bottom: 1px solid var(--line-soft);
    background: white;
    transition: background-color .08s;
  }
  .drop-cell:nth-child(even) { background: #fafbfc; }
  .drop-cell.drop-hover {
    background: var(--gold-soft) !important;
    box-shadow: inset 0 0 0 2px var(--gold);
  }

  .practice-block {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 4px;
    color: white;
    padding: 3px 5px 9px;
    font-size: 11px;
    font-weight: 600;
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
    overflow: hidden;
    line-height: 1.2;
    user-select: none;
    z-index: 2;
  }
  body:not(.read-only) .practice-block { cursor: grab; }
  body:not(.read-only) .practice-block:active { cursor: grabbing; }
  .practice-block.conflict {
    box-shadow: 0 0 0 2px var(--danger), 0 1px 3px rgba(0,0,0,.25);
  }
  .practice-block.conflict::before {
    content: "⚠";
    position: absolute;
    top: 2px;
    right: 18px;
    font-size: 11px;
    opacity: .9;
  }
  .practice-block .pb-time {
    font-size: 10px;
    font-weight: 500;
    opacity: .9;
    margin-top: 1px;
  }
  .practice-block .resize {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 7px;
    cursor: ns-resize;
    background: rgba(255,255,255,.18);
  }
  .practice-block .resize:hover { background: rgba(255,255,255,.4); }
  .practice-block .resize-top {
    position: absolute;
    left: 0; right: 22px; top: 0;     /* leave room for the delete corner */
    height: 7px;
    cursor: ns-resize;
    background: rgba(255,255,255,.18);
  }
  .practice-block .resize-top:hover { background: rgba(255,255,255,.4); }
  .practice-block .pb-del {
    position: absolute;
    top: 2px;
    right: 3px;
    width: 15px; height: 15px;
    border-radius: 8px;
    background: rgba(0,0,0,.3);
    color: white;
    border: none;
    font-size: 10px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    display: none;
  }
  .practice-block:hover .pb-del { display: block; }
  .practice-block.blackout-block {
    background: repeating-linear-gradient(45deg, #555, #555 7px, #6a6a6a 7px, #6a6a6a 14px);
  }
  body.dragging .drop-cell { cursor: copy; }

  /* ============== Team summary (bottom of page) ============== */
  #team-summary {
    background: var(--panel);
    border-top: 3px solid var(--gold);
    padding: 10px 16px 14px;
    max-height: 32vh;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #team-summary .summary-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  #team-summary .summary-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--accent);
    font-weight: 700;
  }
  #team-summary .summary-week {
    font-size: 12px;
    color: var(--muted);
  }
  #team-summary .summary-totals {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
  }
  #team-summary .summary-totals b { color: var(--accent); }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .summary-table th {
    text-align: left;
    font-weight: 600;
    color: #374151;
    padding: 4px 8px;
    border-bottom: 1px solid var(--line);
    background: #fafbfc;
    position: sticky;
    top: 0;
  }
  .summary-table td {
    padding: 4px 8px;
    border-bottom: 1px solid var(--line-soft);
  }
  .summary-table tbody tr:hover { background: #fafbfc; }
  .summary-table .team-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-table .swatch-mini { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .summary-table .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    width: 1%;
    white-space: nowrap;
  }
  .summary-table .none { color: var(--muted); }
  .summary-table .group-row td {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    padding: 4px 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ============== Modal ============== */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .modal {
    background: white;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
    width: 440px;
    max-width: 92vw;
    max-height: 85vh;
    overflow: auto;
  }
  .modal h2 {
    margin: 0;
    padding: 14px 18px;
    font-size: 15px;
    border-bottom: 1px solid var(--line);
    color: var(--accent);
  }
  .modal .body { padding: 16px 18px; }
  .modal .row { margin-bottom: 12px; }
  .modal label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  .modal input, .modal select {
    width: 100%;
    padding: 7px 9px;
    font: inherit;
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .modal .footer {
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 8px;
    min-height: 16px;
  }
  .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch {
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .swatch.selected {
    border-color: #111;
    box-shadow: 0 0 0 2px white inset;
  }
  .calendar-list .row {
    display: flex;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--line-soft);
    gap: 8px;
  }
  .swatch-mini { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .calendar-list .name { flex: 1; font-size: 13px; }
  .calendar-list .count { font-size: 11px; color: var(--muted); }
</style>
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
</head>
<body class="read-only">

<div id="sidebar">
  <header>
    <div class="brand">
      <img class="brand-logo"
           src="https://sybafargo.dreamhosters.com/wp-content/uploads/2026/02/SYBA-logo-150x150.png"
           alt="SYBA logo"
           onerror="this.style.display='none'">
      <div class="brand-text">
        <h1>SYBA <span class="gold-accent">NORTH FARGO</span><br>PRACTICE SCHEDULER</h1>
        <div class="sub" id="brand-sub">Read-only · log in to edit</div>
        <div class="version-tag" id="version-tag"></div>
      </div>
    </div>
  </header>
  <div class="scroll">
    <h3>Teams</h3>
    <div id="team-palette"></div>
    <button class="add-row editor-only" onclick="openTeamModal()">+ Add team</button>

    <h3 class="editor-only">Special</h3>
    <div class="chip blackout editor-only"
         id="blackout-chip"
         draggable="false"
         ondragstart="dragStartBlackout(event)"
         ondragend="onDragEnd()">
      ⛔ Blackout (school event)
    </div>

    <h3>Gyms</h3>
    <div id="gym-list"></div>
    <button class="add-row editor-only" onclick="openGymModal()">+ Add gym</button>
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <div class="week-nav">
      <button onclick="shiftWeek(-1)" title="Previous week">◀</button>
      <span class="week-label" id="week-label"></span>
      <button onclick="shiftWeek(1)" title="Next week">▶</button>
    </div>
    <button onclick="goToday()">Today</button>
    <button class="editor-only" onclick="copyWeekToNext()" title="Duplicate this week's practices into next week">Copy week → next</button>
    <button class="editor-only danger" onclick="clearWeek()">Clear week</button>

    <span class="save-status editor-only" id="save-status">
      <span class="dot"></span><span class="label">Saved</span>
    </span>

    <span class="spacer"></span>

    <button onclick="window.open('/view.html', '_blank')" title="Open the parent/coach view in a new tab">👁 Parent view</button>
    <button class="gold" onclick="openCalendarModal()">📅 Export team calendars</button>

    <span class="auth-info" id="auth-info"></span>
    <button id="login-btn" onclick="openLoginModal()">🔐 Log in to edit</button>
    <button id="logout-btn" class="editor-only" onclick="logout()">Log out</button>
  </div>

  <div id="banner-host"></div>
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>
  <div id="team-summary"></div>
</div>

<div id="modal-host"></div>

<script>
//============================================================
// CONFIG
//============================================================
const APP_VERSION = "0.3.7";
console.log("[scheduler] app version", APP_VERSION);
const DEBUG_SYNC = true;  // toggle off later
// Weekdays SYBA actually practices on. Offset is days from Monday (0=Mon..4=Fri).
// To re-enable Wednesday or any other day, add it back to this list.
const WEEKDAYS = [
  { name: "Mon", offset: 0 },
  { name: "Tue", offset: 1 },
  { name: "Thu", offset: 3 },
  { name: "Fri", offset: 4 }
];
const START_MIN = 17 * 60;     // 5:00 PM
const END_MIN   = 21 * 60;     // 9:00 PM
const SLOT_MIN  = 30;          // visual cell height (one row of the grid)
const SNAP_MIN  = 5;           // start/end snap granularity inside a cell
const MIN_DUR_MIN = 15;        // minimum practice duration via resize
const SLOT_PX   = 36;          // matches CSS --slot
const PX_PER_MIN = SLOT_PX / SLOT_MIN;  // 1.2 px per minute
const DEFAULT_DUR_MIN = 90;    // 1.5 hr
const SLOT_COUNT = (END_MIN - START_MIN) / SLOT_MIN;
const COLORS = [
  "#0c2340","#c8a93e","#c1272d","#0b6e4f","#7a3e9d","#d97706",
  "#0e7490","#be185d","#374151","#4f46e5","#a16207","#15803d",
  "#9a3412","#6b21a8","#0369a1","#525252"
];
const GRADES  = ["3rd","4th","5th","6th","7th","8th"];
const GENDERS = ["Boys","Girls"];

const SAVE_DEBOUNCE_MS = 600;

//============================================================
// POCKETBASE CLIENT
//============================================================
// Same-origin: PocketBase serves both the HTML and the API.
const pb = new PocketBase(window.location.origin);
pb.autoCancellation(false);

//============================================================
// STATE
//============================================================
let STATE = emptyState();
let META = {
  scheduleId: null,
  version: 0,
  loaded: false,
  unsubscribe: null
};
let SAVE = {
  dirty: false,
  saving: false,
  error: null,
  timer: null,
  lastSyncedAt: null
};
let currentMonday = mondayOf(new Date());
let nextId = 1;
function newId(prefix){ return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7); }

function emptyState() {
  return { teams: [], gyms: [], practices: [], blackouts: [] };
}

//============================================================
// DATE HELPERS
//============================================================
function mondayOf(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const wd = x.getDay();
  const diff = (wd === 0 ? -6 : 1 - wd);
  x.setDate(x.getDate() + diff);
  return x;
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function dateKey(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}
function fmtMonthDay(d) {
  return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
}
function fmtTime(min) {
  let h = Math.floor(min/60), m = min%60;
  const ampm = h >= 12 ? "PM" : "AM";
  const h12  = ((h+11)%12)+1;
  return h12 + ":" + String(m).padStart(2,"0") + " " + ampm;
}
function fmtClock(d) {
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}
function isSameDate(a, b) {
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate();
}

//============================================================
// LOAD / SAVE TO POCKETBASE
//============================================================
async function loadSchedule() {
  showBanner("");
  try {
    const records = await pb.collection("schedules").getFullList({ sort: "created", $autoCancel: false });
    if (!records.length) {
      showBanner("error",
        `No schedule record exists yet. Open the admin UI at <a href="/_/" target="_blank">/_/</a>, log in, and ensure the migrations have run.`);
      return;
    }
    const rec = records[0];
    META.scheduleId = rec.id;
    META.version = rec.version || 0;
    META.loaded  = true;
    STATE = sanitizeSchedule(rec.data);
    setSaveStatus("saved");
    render();
    subscribeToUpdates();
  } catch (err) {
    showBanner("error", "Couldn't load the schedule: " + (err.message || err));
  }
}

function sanitizeSchedule(data) {
  data = data || {};
  return {
    teams: Array.isArray(data.teams) ? data.teams : [],
    gyms:  Array.isArray(data.gyms)  ? data.gyms  : [],
    practices: Array.isArray(data.practices) ? data.practices : [],
    blackouts: Array.isArray(data.blackouts) ? data.blackouts : []
  };
}

function markDirty() {
  if (!isEditor() || !META.loaded) return;
  if (DEBUG_SYNC) console.log("[sync] markDirty (META.version=" + META.version + ")");
  SAVE.dirty = true;
  setSaveStatus("dirty");
  if (SAVE.timer) clearTimeout(SAVE.timer);
  SAVE.timer = setTimeout(saveNow, SAVE_DEBOUNCE_MS);
}

async function saveNow() {
  if (!isEditor() || !META.loaded || !META.scheduleId) return;
  if (SAVE.saving) {
    // Will be re-triggered after current save resolves
    return;
  }
  SAVE.timer = null;
  SAVE.saving = true;
  // Clear dirty NOW. If a mutation lands during the save, markDirty() will
  // set it back to true and we'll know to flush again afterward. Without
  // this, the dirty flag from the mutation that *triggered* this save
  // remains set, and the post-save check loops forever.
  SAVE.dirty = false;
  setSaveStatus("saving");
  const prevVersion = META.version || 0;
  const newVersion  = prevVersion + 1;
  // Optimistically bump META.version BEFORE sending so when the realtime
  // subscription delivers our own write back to us, the
  //   remoteVer <= META.version
  // check in subscribeToUpdates() correctly identifies it as our own
  // change and ignores it. Rolled back on error.
  META.version = newVersion;
  if (DEBUG_SYNC) console.log("[sync] saveNow sending version=" + newVersion);
  try {
    const rec = await pb.collection("schedules").update(META.scheduleId, {
      data: STATE,
      version: newVersion
    });
    if (DEBUG_SYNC) console.log("[sync] saveNow OK, server returned version=" + rec.version);
    META.version = rec.version || newVersion;
    SAVE.saving = false;
    SAVE.lastSyncedAt = new Date();
    if (SAVE.dirty) {
      // A mutation arrived while we were saving — flush it (will debounce).
      markDirty();
    } else {
      setSaveStatus("saved");
    }
  } catch (err) {
    META.version = prevVersion;   // rollback
    SAVE.saving = false;
    SAVE.dirty = true;            // unsaved changes still pending
    SAVE.error = err.message || String(err);
    setSaveStatus("error");
    console.error("save failed:", err);
  }
}

function setSaveStatus(state) {
  const el = document.getElementById("save-status");
  if (!el) return;
  el.classList.remove("dirty","saving","error");
  const label = el.querySelector(".label");
  switch (state) {
    case "dirty":
      el.classList.add("dirty");
      label.textContent = "Unsaved changes";
      break;
    case "saving":
      el.classList.add("saving");
      label.textContent = "Saving…";
      break;
    case "error":
      el.classList.add("error");
      label.textContent = "Save failed — retry shortly";
      break;
    case "saved":
    default:
      label.textContent = SAVE.lastSyncedAt
        ? "Saved at " + fmtClock(SAVE.lastSyncedAt)
        : "Saved";
  }
}

function subscribeToUpdates() {
  if (META.unsubscribe) { META.unsubscribe(); META.unsubscribe = null; }
  if (!META.scheduleId) return;
  pb.collection("schedules")
    .subscribe(META.scheduleId, (e) => {
      if (DEBUG_SYNC) console.log("[sync] realtime event", {
        action: e.action,
        remoteVer: e.record && e.record.version,
        localVer: META.version,
        dirty: SAVE.dirty,
        saving: SAVE.saving
      });
      if (e.action !== "update") return;
      const remoteVer = e.record.version || 0;
      if (remoteVer <= META.version) {
        if (DEBUG_SYNC) console.log("[sync]   → echo of our own write, ignoring");
        return;
      }
      if (DEBUG_SYNC) console.log("[sync]   → genuine remote change, applying");
      META.version = remoteVer;
      STATE = sanitizeSchedule(e.record.data);
      // If we have a pending local save, the next save will clobber the
      // remote change. With 1–3 editors this is acceptable; flag visibly.
      if (SAVE.dirty || SAVE.saving) {
        showBanner("error",
          "Another editor just saved while you had unsaved changes. " +
          "Your last edit will overwrite theirs when it syncs.");
      } else {
        showBanner(""); // clear any prior banner
      }
      render();
    })
    .catch(err => console.warn("realtime subscribe failed:", err));
}

function openLoginModal() {
  showModal(`
    <div class="modal" style="width:380px">
      <h2>Editor login</h2>

async function submitLogin() {
  const email = document.getElementById("lg-email").value.trim();
  const pw    = document.getElementById("lg-password").value;
  const err   = document.getElementById("lg-err");

  try {
    await pb.collection("users").authWithPassword(email, pw);
    closeModal();
    applyAuthMode();
    render();
  } catch (e) {
    err.textContent = "Login failed: " + (e.message || "check your credentials");
  }
}

function logout() {
  pb.authStore.clear();
  applyAuthMode();
  render();
}

//============================================================
// RENDER: SCHEDULE GRID
//============================================================
function renderSchedule() {
  const host = document.getElementById("grid");
  host.innerHTML = "";
  if (!STATE.gyms.length) {
    host.innerHTML = `<div style="padding:30px; color:var(--muted);">No gyms have been added yet.</div>`;
    return;
  }

  const headerWrap = el("div","grid-header");
  const headerRow1 = el("div","header-row");
  headerRow1.appendChild(el("div","corner"));
  const today = new Date();
  for (const day of WEEKDAYS) {
    const date = addDays(currentMonday, day.offset);
    const isToday = isSameDate(date, today);
    const dayGroup = el("div","day-group" + (isToday?" day-today":""));
    dayGroup.style.width = (STATE.gyms.length * parseInt(getCss("--gym-col"))) + "px";
    dayGroup.appendChild(el("div","day-title", `${day.name} · ${fmtMonthDay(date)}`));
    const gymHeaders = el("div","gym-headers");
    for (const g of STATE.gyms) {
      gymHeaders.appendChild(el("div","gym-header", g.name));
    }
    dayGroup.appendChild(gymHeaders);
    headerRow1.appendChild(dayGroup);
  }
  headerWrap.appendChild(headerRow1);
  host.appendChild(headerWrap);

  const bodyRow = el("div","body-row");
  const timeCol = el("div","time-col");
  for (let i=0; i<SLOT_COUNT; i++) {
    timeCol.appendChild(el("div","time-label", fmtTime(START_MIN + i*SLOT_MIN)));
  }
  bodyRow.appendChild(timeCol);

  const conflictIds = new Set();
  for (const day of WEEKDAYS) {
    const dk = dateKey(addDays(currentMonday, day.offset));
    computeConflicts(dk).forEach(id => conflictIds.add(id));
  }

  const editor = isEditor();
  for (const day of WEEKDAYS) {
    const date = addDays(currentMonday, day.offset);
    const dk   = dateKey(date);
    const dayStrip = el("div","day-strip");
    dayStrip.dataset.day = day.offset;

    for (const g of STATE.gyms) {
      const gymStrip = el("div","gym-strip");
      gymStrip.dataset.gymId = g.id;
      gymStrip.dataset.date  = dk;
      gymStrip.style.height = (SLOT_COUNT * SLOT_PX) + "px";

      for (let s=0; s<SLOT_COUNT; s++) {
        const cell = el("div","drop-cell");
        cell.dataset.slot = s;
        cell.dataset.gymId = g.id;
        cell.dataset.date  = dk;
        if (editor) {
          cell.addEventListener("dragenter", onCellDragEnter);
          cell.addEventListener("dragover",  onCellDragOver);
          cell.addEventListener("dragleave", onCellDragLeave);
          cell.addEventListener("drop",      onCellDrop);
        }
        gymStrip.appendChild(cell);
      }

      for (const p of STATE.practices) {
        if (p.date !== dk || p.gymId !== g.id) continue;
        gymStrip.appendChild(renderPracticeBlock(p, conflictIds.has(p.id), editor));
      }
      for (const b of STATE.blackouts) {
        if (b.date !== dk || b.gymId !== g.id) continue;
        gymStrip.appendChild(renderBlackoutBlock(b, editor));
      }
      dayStrip.appendChild(gymStrip);
    }
    bodyRow.appendChild(dayStrip);
  }
  host.appendChild(bodyRow);
}

function renderPracticeBlock(p, isConflict, editor) {
  const t = teamById(p.teamId);
  const div = document.createElement("div");
  div.className = "practice-block" + (isConflict ? " conflict" : "");
  div.style.background = t ? t.color : "#666";
  div.style.top    = ((p.startMin - START_MIN) / SLOT_MIN * SLOT_PX) + "px";
  div.style.height = (p.durationMin / SLOT_MIN * SLOT_PX) + "px";
  div.draggable = editor;
  div.dataset.practiceId = p.id;
  if (editor) {
    div.addEventListener("dragstart", e => dragStartPractice(e, p.id));
    div.addEventListener("dragend",   onDragEnd);
  }
  const name = t ? `${t.grade} ${t.gender} ${t.name}` : "(deleted team)";
  div.innerHTML = `
    <div>${escapeHtml(name)}</div>
    <div class="pb-time">${fmtTime(p.startMin)}–${fmtTime(p.startMin + p.durationMin)}</div>
    ${editor ? `
      <div class="resize-top" title="Drag to change start time"></div>
      <button class="pb-del" title="Delete">×</button>
      <div class="resize" title="Drag to change end time"></div>` : ""}`;
  if (editor) {
    div.querySelector(".pb-del").addEventListener("click", e => {
      e.stopPropagation();
      mutate(() => { STATE.practices = STATE.practices.filter(x => x.id !== p.id); });
    });
    div.querySelector(".resize").addEventListener("mousedown", e => startResize(e, p.id, null));
    div.querySelector(".resize-top").addEventListener("mousedown", e => startResizeTop(e, p.id, null));
  }
  return div;
}
function renderBlackoutBlock(b, editor) {
  const div = document.createElement("div");
  div.className = "practice-block blackout-block";
  div.style.top    = ((b.startMin - START_MIN) / SLOT_MIN * SLOT_PX) + "px";
  div.style.height = (b.durationMin / SLOT_MIN * SLOT_PX) + "px";
  div.draggable = editor;
  div.dataset.blackoutId = b.id;
  if (editor) {
    div.addEventListener("dragstart", e => dragStartBlackoutMove(e, b.id));
    div.addEventListener("dragend",   onDragEnd);
  }
  div.innerHTML = `
    <div>⛔ ${escapeHtml(b.label || "Blackout")}</div>
    <div class="pb-time">${fmtTime(b.startMin)}–${fmtTime(b.startMin + b.durationMin)}</div>
    ${editor ? `
      <div class="resize-top" title="Drag to change start time"></div>
      <button class="pb-del" title="Delete">×</button>
      <div class="resize" title="Drag to change end time"></div>` : ""}`;
  if (editor) {
    div.querySelector(".pb-del").addEventListener("click", e => {
      e.stopPropagation();
      mutate(() => { STATE.blackouts = STATE.blackouts.filter(x => x.id !== b.id); });
    });
    div.querySelector(".resize").addEventListener("mousedown", e => startResize(e, null, b.id));
    div.querySelector(".resize-top").addEventListener("mousedown", e => startResizeTop(e, null, b.id));
  }
  return div;
}

//============================================================
// CONFLICTS
//============================================================
function computeConflicts(dk) {
  const conflict = new Set();
  const byGym = {};
  for (const p of STATE.practices) {
    if (p.date !== dk) continue;
    (byGym[p.gymId] = byGym[p.gymId] || []).push(p);
  }
  for (const gid in byGym) {
    const arr = byGym[gid];
    for (let i=0; i<arr.length; i++) {
      for (let j=i+1; j<arr.length; j++) {
        const a = arr[i], b = arr[j];
        if (a.startMin < b.startMin + b.durationMin && b.startMin < a.startMin + a.durationMin) {
          conflict.add(a.id); conflict.add(b.id);
        }
      }
    }
  }
  return conflict;
}

//============================================================
// MUTATION HELPER (state change → save)
//============================================================
function mutate(fn) {
  fn();
  render();
  markDirty();
}

//============================================================
// DRAG & DROP
//============================================================
function dragStartTeam(e, teamId) {
  if (!isEditor()) return;
  e.dataTransfer.setData("text/x-kind", "team");
  e.dataTransfer.setData("text/x-team", teamId);
  e.dataTransfer.effectAllowed = "copy";
  document.body.classList.add("dragging");
}
function dragStartBlackout(e) {
  if (!isEditor()) return;
  e.dataTransfer.setData("text/x-kind", "blackout-new");
  e.dataTransfer.effectAllowed = "copy";
  document.body.classList.add("dragging");
}
function dragStartPractice(e, practiceId) {
  if (!isEditor()) return;
  e.dataTransfer.setData("text/x-kind", "practice-move");
  e.dataTransfer.setData("text/x-pid", practiceId);
  e.dataTransfer.effectAllowed = "move";
  document.body.classList.add("dragging");
}
function dragStartBlackoutMove(e, blackoutId) {
  if (!isEditor()) return;
  e.dataTransfer.setData("text/x-kind", "blackout-move");
  e.dataTransfer.setData("text/x-bid", blackoutId);
  e.dataTransfer.effectAllowed = "move";
  document.body.classList.add("dragging");
}
function onDragEnd() {
  document.body.classList.remove("dragging");
  document.querySelectorAll(".drop-cell.drop-hover")
    .forEach(c => c.classList.remove("drop-hover"));
}
function onCellDragEnter(e) { e.preventDefault(); e.currentTarget.classList.add("drop-hover"); }
function onCellDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add("drop-hover"); }
function onCellDragLeave(e) { e.currentTarget.classList.remove("drop-hover"); }
// Snap drops to the cell's 30-min start. For 5-min granularity in start
// time, the user drags the TOP edge of the block after dropping.
function dropMinFromEvent(cell, e) {
  const cellSlot = parseInt(cell.dataset.slot, 10);
  return START_MIN + cellSlot * SLOT_MIN;
}

function onCellDrop(e) {
  e.preventDefault();
  const cell = e.currentTarget;
  cell.classList.remove("drop-hover");
  document.body.classList.remove("dragging");
  if (!isEditor()) return;

  const kind = e.dataTransfer.getData("text/x-kind");
  if (!kind) return;
  const startMin = dropMinFromEvent(cell, e);
  const gymId = cell.dataset.gymId;
  const date  = cell.dataset.date;

  if (kind === "team") {
    const teamId = e.dataTransfer.getData("text/x-team");
    mutate(() => {
      STATE.practices.push({
        id: newId("p"), teamId, gymId, date,
        startMin, durationMin: clampDur(DEFAULT_DUR_MIN, startMin)
      });
    });
  } else if (kind === "blackout-new") {
    const label = prompt('Blackout label (e.g. "Orchestra concert", "PTA event")', "School event");
    if (label === null) return;
    mutate(() => {
      STATE.blackouts.push({
        id: newId("b"), gymId, date,
        startMin, durationMin: clampDur(DEFAULT_DUR_MIN, startMin),
        label: label || "Blackout"
      });
    });
  } else if (kind === "practice-move") {
    const id = e.dataTransfer.getData("text/x-pid");
    mutate(() => {
      const p = STATE.practices.find(x => x.id === id);
      if (!p) return;
      p.gymId = gymId; p.date = date; p.startMin = startMin;
      p.durationMin = clampDur(p.durationMin, startMin);
    });
  } else if (kind === "blackout-move") {
    const id = e.dataTransfer.getData("text/x-bid");
    mutate(() => {
      const b = STATE.blackouts.find(x => x.id === id);
      if (!b) return;
      b.gymId = gymId; b.date = date; b.startMin = startMin;
      b.durationMin = clampDur(b.durationMin, startMin);
    });
  }
}
function clampDur(want, startMin) {
  const max = END_MIN - startMin;
  if (max < MIN_DUR_MIN) return Math.max(SNAP_MIN, max);  // edge of day
  return Math.max(MIN_DUR_MIN, Math.min(want, max));
}

//============================================================
// RESIZE
//============================================================
function startResize(e, practiceId, blackoutId) {
  if (!isEditor()) return;
  e.preventDefault(); e.stopPropagation();
  const item = practiceId
    ? STATE.practices.find(p => p.id === practiceId)
    : STATE.blackouts.find(b => b.id === blackoutId);
  if (!item) return;
  const startY = e.clientY;
  const startDur = item.durationMin;
  const move = ev => {
    const dy = ev.clientY - startY;
    const dyMin = Math.round((dy / PX_PER_MIN) / SNAP_MIN) * SNAP_MIN;
    const next = clampDur(startDur + dyMin, item.startMin);
    if (next !== item.durationMin) {
      item.durationMin = next;
      render();
    }
  };
  const up = () => {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    if (item.durationMin !== startDur) markDirty();
  };
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

// Drag the top edge: end time stays put, start time shifts in 5-min steps.
function startResizeTop(e, practiceId, blackoutId) {
  if (!isEditor()) return;
  e.preventDefault(); e.stopPropagation();
  const item = practiceId
    ? STATE.practices.find(p => p.id === practiceId)
    : STATE.blackouts.find(b => b.id === blackoutId);
  if (!item) return;
  const startY = e.clientY;
  const origStart = item.startMin;
  const origDur   = item.durationMin;
  const fixedEnd  = origStart + origDur;
  const move = ev => {
    const dy = ev.clientY - startY;
    const dyMin = Math.round((dy / PX_PER_MIN) / SNAP_MIN) * SNAP_MIN;
    let newStart = origStart + dyMin;
    // Constrain: can't start before schedule start, must leave at least
    // MIN_DUR_MIN of practice before the (fixed) end.
    newStart = Math.max(START_MIN, Math.min(fixedEnd - MIN_DUR_MIN, newStart));
    const newDur = fixedEnd - newStart;
    if (newStart !== item.startMin || newDur !== item.durationMin) {
      item.startMin    = newStart;
      item.durationMin = newDur;
      render();
    }
  };
  const up = () => {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    if (item.startMin !== origStart) markDirty();
  };
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
}

//============================================================
// WEEK ACTIONS
//============================================================
function shiftWeek(n) { currentMonday = addDays(currentMonday, n*7); render(); }
function goToday() { currentMonday = mondayOf(new Date()); render(); }
function copyWeekToNext() {
  if (!isEditor()) return;
  const startKeys = [];
  for (const day of WEEKDAYS) startKeys.push(dateKey(addDays(currentMonday, day.offset)));
  const sP = STATE.practices.filter(p => startKeys.includes(p.date));
  const sB = STATE.blackouts.filter(b => startKeys.includes(b.date));
  if (!sP.length && !sB.length) { alert("Nothing to copy in this week."); return; }
  mutate(() => {
    for (const p of sP) {
      const d = new Date(p.date + "T00:00:00");
      STATE.practices.push({ ...p, id: newId("p"), date: dateKey(addDays(d, 7)) });
    }
    for (const b of sB) {
      const d = new Date(b.date + "T00:00:00");
      STATE.blackouts.push({ ...b, id: newId("b"), date: dateKey(addDays(d, 7)) });
    }
  });
  shiftWeek(1);
}
function clearWeek() {
  if (!isEditor()) return;
  if (!confirm("Delete all practices and blackouts in this week?")) return;
  const keys = [];
  for (const day of WEEKDAYS) keys.push(dateKey(addDays(currentMonday, day.offset)));
  mutate(() => {
    STATE.practices = STATE.practices.filter(p => !keys.includes(p.date));
    STATE.blackouts = STATE.blackouts.filter(b => !keys.includes(b.date));
  });
}

//============================================================
// ICAL EXPORT (client-side, available to everyone)
//============================================================
function icsEscape(s){
  return String(s).replace(/[\\,;]/g, m => "\\"+m).replace(/\n/g, "\\n");
}
function icsDateTime(date, min) {
  const [y,mo,d] = date.split("-").map(Number);
  const h = Math.floor(min/60), mm = min%60;
  return `${y}${String(mo).padStart(2,"0")}${String(d).padStart(2,"0")}T${String(h).padStart(2,"0")}${String(mm).padStart(2,"0")}00`;
}
function nowUtcStamp() {
  const n = new Date();
  return n.getUTCFullYear() +
    String(n.getUTCMonth()+1).padStart(2,"0") +
    String(n.getUTCDate()).padStart(2,"0") + "T" +
    String(n.getUTCHours()).padStart(2,"0") +
    String(n.getUTCMinutes()).padStart(2,"0") +
    String(n.getUTCSeconds()).padStart(2,"0") + "Z";
}
const VTIMEZONE_CENTRAL = [
  "BEGIN:VTIMEZONE",
  "TZID:America/Chicago",
  "BEGIN:STANDARD",
  "DTSTART:19701101T020000",
  "TZOFFSETFROM:-0500",
  "TZOFFSETTO:-0600",
  "TZNAME:CST",
  "RRULE:FREQ=YEARLY;BYMONTH=11;BYDAY=1SU",
  "END:STANDARD",
  "BEGIN:DAYLIGHT",
  "DTSTART:19700308T020000",
  "TZOFFSETFROM:-0600",
  "TZOFFSETTO:-0500",
  "TZNAME:CDT",
  "RRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=2SU",
  "END:DAYLIGHT",
  "END:VTIMEZONE"
].join("\r\n");

function buildIcsForTeam(team) {
  const events = STATE.practices
    .filter(p => p.teamId === team.id)
    .sort((a,b) => (a.date+a.startMin).localeCompare(b.date+b.startMin));
  const stamp = nowUtcStamp();
  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//SYBA North Fargo Practice Scheduler//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "X-WR-CALNAME:" + icsEscape(teamLabel(team)) + " Practice",
    "X-WR-TIMEZONE:America/Chicago",
    VTIMEZONE_CENTRAL
  ];
  for (const p of events) {
    const gym = gymById(p.gymId);
    lines.push(
      "BEGIN:VEVENT",
      "UID:" + p.id + "@northfargo-practice",
      "DTSTAMP:" + stamp,
      "DTSTART;TZID=America/Chicago:" + icsDateTime(p.date, p.startMin),
      "DTEND;TZID=America/Chicago:"   + icsDateTime(p.date, p.startMin + p.durationMin),
      "SUMMARY:" + icsEscape(teamLabel(team) + " Practice"),
      "LOCATION:" + icsEscape(gym ? gym.name : ""),
      "DESCRIPTION:" + icsEscape("Team: " + teamLabel(team) + (gym ? "\nGym: " + gym.name : "")),
      "END:VEVENT"
    );
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}
function downloadIcs(team) {
  const data = buildIcsForTeam(team);
  const blob = new Blob([data], { type:"text/calendar;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = teamLabel(team).replace(/[^a-z0-9]+/gi,"_") + ".ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 500);
}
function downloadAllIcs() { for (const t of STATE.teams) downloadIcs(t); }

//============================================================
// MODALS
//============================================================
function closeModal(){ document.getElementById("modal-host").innerHTML = ""; }
function showModal(html){
  document.getElementById("modal-host").innerHTML =
    `<div class="modal-back" onclick="if(event.target===this) closeModal()">${html}</div>`;
}
function openTeamModal(teamId) {
  if (!isEditor()) return;
  const t = teamId ? teamById(teamId) : null;
  const grade  = t ? t.grade  : "3rd";
  const gender = t ? t.gender : "Boys";
  const name   = t ? t.name   : "";
  const color  = t ? t.color  : COLORS[0];
  const gradeOpts  = GRADES.map(g => `<option ${g===grade?"selected":""}>${g}</option>`).join("");
  const genderOpts = GENDERS.map(g => `<option ${g===gender?"selected":""}>${g}</option>`).join("");
  const swatches = COLORS.map(c =>
    `<div class="swatch ${c===color?"selected":""}" data-color="${c}" style="background:${c}" onclick="selectSwatch(this)"></div>`).join("");
  showModal(`
    <div class="modal">
      <h2>${t ? "Edit team" : "Add team"}</h2>
      <div class="body">
        <div class="row"><label>Grade</label><select id="tm-grade">${gradeOpts}</select></div>
        <div class="row"><label>Gender</label><select id="tm-gender">${genderOpts}</select></div>
        <div class="row"><label>Team name (e.g. Navy, Gold, Varsity)</label>
          <input id="tm-name" value="${escapeAttr(name)}" placeholder="Navy"></div>
        <div class="row"><label>Color</label>
          <div class="color-grid" id="tm-colors">${swatches}</div></div>
      </div>
      <div class="footer">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="saveTeam('${teamId||""}')">${t ? "Save" : "Add team"}</button>
      </div>
    </div>`);
  setTimeout(()=>document.getElementById("tm-name").focus(), 30);
}
function selectSwatch(el) {
  el.parentElement.querySelectorAll(".swatch").forEach(s => s.classList.remove("selected"));
  el.classList.add("selected");
}
function saveTeam(teamId) {
  if (!isEditor()) return;
  const grade  = document.getElementById("tm-grade").value;
  const gender = document.getElementById("tm-gender").value;
  const name   = document.getElementById("tm-name").value.trim();
  const colorEl= document.querySelector("#tm-colors .swatch.selected");
  const color  = colorEl ? colorEl.dataset.color : COLORS[0];
  if (!name) { alert("Team name is required."); return; }
  mutate(() => {
    if (teamId) Object.assign(teamById(teamId), { grade, gender, name, color });
    else STATE.teams.push({ id: newId("t"), grade, gender, name, color });
  });
  closeModal();
}
function deleteTeam(teamId) {
  if (!isEditor()) return;
  const t = teamById(teamId); if (!t) return;
  const used = STATE.practices.filter(p => p.teamId === teamId).length;
  const msg = used
    ? `Delete ${teamLabel(t)}? Their ${used} practices on the schedule will also be removed.`
    : `Delete ${teamLabel(t)}?`;
  if (!confirm(msg)) return;
  mutate(() => {
    STATE.teams = STATE.teams.filter(x => x.id !== teamId);
    STATE.practices = STATE.practices.filter(p => p.teamId !== teamId);
  });
}
function openGymModal(gymId) {
  if (!isEditor()) return;
  const g = gymId ? gymById(gymId) : null;
  showModal(`
    <div class="modal">
      <h2>${g ? "Rename gym" : "Add gym"}</h2>
      <div class="body">
        <div class="row"><label>Gym name</label>
          <input id="gm-name" value="${escapeAttr(g?g.name:"")}" placeholder="Lewis &amp; Clark"></div>
      </div>
      <div class="footer">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="saveGym('${gymId||""}')">${g ? "Save" : "Add gym"}</button>
      </div>
    </div>`);
  setTimeout(()=> document.getElementById("gm-name").focus(), 30);
}
function saveGym(gymId) {
  if (!isEditor()) return;
  const name = document.getElementById("gm-name").value.trim();
  if (!name) { alert("Gym name is required."); return; }
  mutate(() => {
    if (gymId) gymById(gymId).name = name;
    else STATE.gyms.push({ id: newId("g"), name });
  });
  closeModal();
}
function deleteGym(gymId) {
  if (!isEditor()) return;
  const g = gymById(gymId); if (!g) return;
  const usedP = STATE.practices.filter(p => p.gymId === gymId).length;
  const usedB = STATE.blackouts.filter(b => b.gymId === gymId).length;
  const msg = (usedP+usedB)
    ? `Delete ${g.name}? ${usedP} practices and ${usedB} blackouts in this gym will also be removed.`
    : `Delete ${g.name}?`;
  if (!confirm(msg)) return;
  mutate(() => {
    STATE.gyms      = STATE.gyms.filter(x => x.id !== gymId);
    STATE.practices = STATE.practices.filter(p => p.gymId !== gymId);
    STATE.blackouts = STATE.blackouts.filter(b => b.gymId !== gymId);
  });
}
function openCalendarModal() {
  const rows = STATE.teams.map(t => {
    const n = STATE.practices.filter(p => p.teamId === t.id).length;
    return `
      <div class="row">
        <span class="swatch-mini" style="background:${t.color}"></span>
        <span class="name">${escapeHtml(teamLabel(t))}</span>
        <span class="count">${n} practice${n===1?"":"s"}</span>
        <button class="tiny" onclick="downloadIcs(teamById('${t.id}'))" ${n?'':'disabled'}>Download .ics</button>
      </div>`;
  }).join("");
  showModal(`
    <div class="modal" style="width:540px">
      <h2>Export team calendars</h2>
      <div class="body">
        <p style="margin:0 0 10px; font-size:13px; color:#374151;">
          Each team gets its own <b>.ics</b> file with every practice on the schedule.
          Parents can import the file or, with hosting, subscribe to a live URL that auto-refreshes.
        </p>
        <div class="calendar-list">${rows || '<div class="empty-hint">No teams yet.</div>'}</div>
        <div style="margin-top:12px;">
          <button class="primary" onclick="downloadAllIcs()">Download all team calendars</button>
        </div>
        <details style="margin-top:14px; font-size:12.5px; color:#374151;">
          <summary style="cursor:pointer; font-weight:600;">How to make these subscribable (auto-update)</summary>
          <div style="margin-top:8px; line-height:1.45;">
            <ol style="padding-left:20px;">
              <li>Pick a public host: Google Drive (link sharing on), Dropbox public link, GitHub Pages, or your league site.</li>
              <li>Upload each <code>.ics</code> with a stable filename (e.g. <code>3rd-boys-navy.ics</code>).</li>
              <li>Get the direct file link (must end in <code>.ics</code>).</li>
              <li>Share with parents as a subscription URL, e.g. <code>webcal://yoursite.com/3rd-boys-navy.ics</code>.<br>
                  Google Calendar: <i>Other calendars → Add → From URL</i>. Apple Calendar: <i>File → New Calendar Subscription</i>.</li>
              <li>Re-export and overwrite the file at the same URL when you change the schedule — calendars refresh automatically.</li>
            </ol>
          </div>
        </details>
      </div>
      <div class="footer"><button onclick="closeModal()">Close</button></div>
    </div>`);
}

//============================================================
// RENDER: TEAM SUMMARY (bottom panel)
//============================================================
function renderTeamSummary() {
  const host = document.getElementById("team-summary");
  if (!host) return;
  if (!STATE.teams.length) { host.innerHTML = ""; return; }

  // Practices on this calendar week (Mon..Fri)
  const weekKeys = [];
  for (const day of WEEKDAYS) weekKeys.push(dateKey(addDays(currentMonday, day.offset)));

  // Per-team stats for this week
  const stats = STATE.teams.map(t => {
    const tp = STATE.practices.filter(p => p.teamId === t.id && weekKeys.includes(p.date));
    const totalMin = tp.reduce((s, p) => s + (p.durationMin || 0), 0);
    return { team: t, count: tp.length, totalMin };
  });

  // Group by Grade/Gender in palette order so the table mirrors the sidebar
  const groups = {};
  for (const s of stats) {
    const k = `${s.team.grade} Grade ${s.team.gender}`;
    (groups[k] = groups[k] || []).push(s);
  }
  const groupOrder = [];
  for (const g of GRADES) for (const sx of GENDERS) {
    const k = `${g} Grade ${sx}`;
    if (groups[k]) groupOrder.push({ name: k, items: groups[k] });
  }

  // Totals across all teams this week
  const totalPractices = stats.reduce((s, x) => s + x.count, 0);
  const totalMin       = stats.reduce((s, x) => s + x.totalMin, 0);
  const totalHours     = (totalMin / 60).toFixed(1);
  const teamsScheduled = stats.filter(x => x.count > 0).length;
  const teamsUnscheduled = stats.length - teamsScheduled;

  let rows = "";
  for (const grp of groupOrder) {
    rows += `<tr class="group-row"><td colspan="3">${escapeHtml(grp.name)}</td></tr>`;
    for (const s of grp.items) {
      const hours = (s.totalMin / 60).toFixed(1);
      const isEmpty = s.count === 0;
      rows += `<tr>
        <td><div class="team-cell">
          <span class="swatch-mini" style="background:${s.team.color}"></span>
          ${escapeHtml(s.team.name)}
        </div></td>
        <td class="num ${isEmpty?'none':''}">${isEmpty ? "—" : s.count}</td>
        <td class="num ${isEmpty?'none':''}">${isEmpty ? "—" : hours + " h"}</td>
      </tr>`;
    }
  }

  const weekRange = `${fmtMonthDay(currentMonday)} – ${fmtMonthDay(addDays(currentMonday, 4))}`;
  const unschedNote = teamsUnscheduled > 0
    ? ` · <span style="color:var(--danger);">${teamsUnscheduled} team${teamsUnscheduled===1?"":"s"} not scheduled</span>`
    : "";

  host.innerHTML = `
    <div class="summary-head">
      <span class="summary-title">Practices this week</span>
      <span class="summary-week">${weekRange}</span>
      <span class="summary-totals">
        <b>${totalPractices}</b> practice${totalPractices===1?"":"s"} ·
        <b>${totalHours}</b> total hours${unschedNote}
      </span>
    </div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Team</th>
          <th class="num">Practices</th>
          <th class="num">Total time</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

//============================================================
// MASTER RENDER
//============================================================
function render() {
  applyAuthMode();
  renderPalette();
  renderGymList();
  renderWeekLabel();
  renderSchedule();
  renderTeamSummary();
}

//============================================================
// HELPERS
//============================================================
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({
  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function getCss(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

//============================================================
// BOOT
//============================================================
document.getElementById("version-tag").textContent = "v" + APP_VERSION;
applyAuthMode();
render();
loadSchedule();

// React to auth changes from other tabs
pb.authStore.onChange(() => {
  applyAuthMode();
  render();
});
